backend:
  name: git-gateway
  branch: main

locale: es
media_folder: "images"
public_folder: "/images"

collections:
  - name: "contenido"
    label: "Contenido del sitio"
    files:
      - name: "home"
        label: "Página principal"
        file: "content.json"
        fields:

          - label: "SEO y Metadatos"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Título de la página", name: "title", widget: "string" }
              - { label: "Descripción meta", name: "description", widget: "text" }
              - { label: "Palabras clave", name: "keywords", widget: "text" }
              - { label: "Imagen Open Graph", name: "og_image", widget: "image" }

          - label: "Marca"
            name: "marca"
            widget: "object"
            fields:
              - { label: "Nombre del negocio", name: "nombre", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Logo texto (parte 1)", name: "logo_texto", widget: "string" }
              - { label: "Logo sufijo", name: "logo_sufijo", widget: "string" }
              - { label: "Años de experiencia", name: "anios_experiencia", widget: "string" }
              - { label: "Ciudad principal", name: "ciudad", widget: "string" }

          - label: "WhatsApp"
            name: "whatsapp"
            widget: "object"
            fields:
              - { label: "Número (solo dígitos con código de país)", name: "numero", widget: "string", hint: "Ejemplo: 5255879262820" }
              - { label: "Número visible", name: "numero_display", widget: "string" }
              - { label: "Mensaje predeterminado", name: "mensaje_default", widget: "text" }
              - { label: "Mensaje del Hero", name: "mensaje_hero", widget: "text" }
              - { label: "Mensaje de la sección Contacto", name: "mensaje_contacto", widget: "text" }
              - { label: "Mensaje del botón flotante", name: "mensaje_flotante", widget: "text" }

          - label: "Datos de Contacto"
            name: "contacto"
            widget: "object"
            fields:
              - { label: "Teléfono", name: "telefono", widget: "string" }
              - { label: "Enlace de teléfono", name: "telefono_link", widget: "string", hint: "Ejemplo: tel:+525587926282" }
              - { label: "Correo electrónico", name: "email", widget: "string" }
              - { label: "Dirección", name: "direccion", widget: "string" }
              - { label: "URL de Google Maps", name: "maps_url", widget: "string" }
              - { label: "Embed de Google Maps (iframe src)", name: "maps_embed", widget: "text" }
              - { label: "Horario Lunes–Viernes", name: "horario_semana", widget: "string" }
              - { label: "Horario Sábado", name: "horario_sabado", widget: "string" }
              - { label: "Horario Domingo", name: "horario_domingo", widget: "string" }

          - label: "Redes Sociales"
            name: "redes"
            widget: "object"
            fields:
              - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
              - { label: "YouTube URL", name: "youtube", widget: "string", required: false }
              - { label: "TikTok URL", name: "tiktok", widget: "string", required: false }

          - label: "Navegación"
            name: "nav"
            widget: "object"
            fields:
              - label: "Enlace del menú CTA"
                name: "cta_label"
                widget: "string"
              - label: "Mensaje WhatsApp del CTA del menú"
                name: "cta_mensaje"
                widget: "text"
              - label: "Links del menú"
                name: "links"
                widget: "list"
                label_singular: "Enlace"
                fields:
                  - { label: "Texto", name: "label", widget: "string" }
                  - { label: "Destino (href)", name: "href", widget: "string" }

          - label: "Hero Principal"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Badge / Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Título principal", name: "titulo", widget: "text" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
              - { label: "CTA principal (texto)", name: "cta_primario", widget: "string" }
              - { label: "CTA secundario (texto)", name: "cta_secundario", widget: "string" }
              - { label: "Mensaje WhatsApp del CTA principal", name: "cta_mensaje", widget: "text" }
              - { label: "Imagen del Hero", name: "imagen", widget: "image" }
              - { label: "Alt de la imagen", name: "imagen_alt", widget: "string" }

          - label: "Barra de Confianza"
            name: "trust"
            widget: "list"
            label_singular: "Estadística de confianza"
            fields:
              - { label: "Número o valor", name: "numero", widget: "string" }
              - { label: "Etiqueta", name: "label", widget: "string" }
              - { label: "Ícono (Material Icons)", name: "icono", widget: "string", hint: "Ejemplo: verified, stars, inventory, local_shipping" }

          - label: "Productos"
            name: "productos"
            widget: "object"
            fields:
              - { label: "Título de la sección", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
              - label: "Lista de productos"
                name: "items"
                widget: "list"
                label_singular: "Producto"
                fields:
                  - { label: "Nombre del producto", name: "nombre", widget: "string" }
                  - { label: "Descripción", name: "descripcion", widget: "text" }
                  - { label: "¿Qué incluye?", name: "incluye", widget: "text" }
                  - { label: "Garantía", name: "garantia", widget: "string" }
                  - { label: "Imagen", name: "imagen", widget: "image" }
                  - { label: "Alt de imagen", name: "imagen_alt", widget: "string" }
                  - { label: "Texto del botón CTA", name: "cta", widget: "string" }
                  - { label: "Mensaje WhatsApp", name: "mensaje_wa", widget: "text" }
                  - { label: "Badge (etiqueta opcional)", name: "badge", widget: "string", required: false }

          - label: "Proceso de Compra"
            name: "proceso"
            widget: "object"
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
              - label: "Pasos"
                name: "pasos"
                widget: "list"
                label_singular: "Paso"
                fields:
                  - { label: "Número", name: "numero", widget: "string" }
                  - { label: "Título del paso", name: "titulo", widget: "string" }
                  - { label: "Descripción", name: "descripcion", widget: "text" }

          - label: "Beneficios"
            name: "beneficios"
            widget: "object"
            fields:
              - { label: "Título de la sección", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
              - label: "Lista de beneficios"
                name: "items"
                widget: "list"
                label_singular: "Beneficio"
                fields:
                  - { label: "Ícono (Material Icons)", name: "icono", widget: "string" }
                  - { label: "Título", name: "titulo", widget: "string" }
                  - { label: "Descripción", name: "descripcion", widget: "text" }

          - label: "Estadísticas (banda roja)"
            name: "estadisticas"
            widget: "object"
            fields:
              - { label: "Mostrar estadísticas", name: "mostrar", widget: "boolean", default: true }
              - label: "Items"
                name: "items"
                widget: "list"
                label_singular: "Estadística"
                fields:
                  - { label: "Número", name: "numero", widget: "string" }
                  - { label: "Etiqueta", name: "label", widget: "string" }

          - label: "Marcas Compatibles"
            name: "marcas"
            widget: "object"
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
              - label: "Marcas"
                name: "items"
                widget: "list"
                label_singular: "Marca"
                fields:
                  - { label: "Nombre de la marca", name: "nombre", widget: "string" }

          - label: "Testimonios"
            name: "testimonios"
            widget: "object"
            fields:
              - { label: "Título de la sección", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
              - label: "Testimonios"
                name: "items"
                widget: "list"
                label_singular: "Testimonio"
                fields:
                  - { label: "Nombre del cliente", name: "nombre", widget: "string" }
                  - { label: "Cargo o taller", name: "cargo", widget: "string" }
                  - { label: "Testimonio", name: "texto", widget: "text" }
                  - { label: "Estrellas (1-5)", name: "estrellas", widget: "number", min: 1, max: 5, value_type: "int" }
                  - { label: "Foto del cliente (URL)", name: "imagen", widget: "image" }

          - label: "Banner CTA"
            name: "cta_banner"
            widget: "object"
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
              - { label: "Texto del botón", name: "cta", widget: "string" }
              - { label: "Mensaje WhatsApp", name: "mensaje_wa", widget: "text" }

          - label: "FAQ"
            name: "faq"
            widget: "object"
            fields:
              - { label: "Título de la sección", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
              - label: "Preguntas y Respuestas"
                name: "items"
                widget: "list"
                label_singular: "Pregunta"
                fields:
                  - { label: "Pregunta", name: "pregunta", widget: "string" }
                  - { label: "Respuesta", name: "respuesta", widget: "text" }

          - label: "Sección de Contacto"
            name: "contacto_seccion"
            widget: "object"
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
              - { label: "Título del formulario", name: "form_titulo", widget: "string" }
              - { label: "Subtítulo del formulario", name: "form_subtitulo", widget: "text" }
              - { label: "Label campo nombre", name: "campo_nombre", widget: "string" }
              - { label: "Label campo vehículo", name: "campo_vehiculo", widget: "string" }
              - { label: "Label campo pieza", name: "campo_pieza", widget: "string" }
              - { label: "Label campo mensaje", name: "campo_mensaje", widget: "string" }
              - { label: "Texto del botón enviar", name: "boton_enviar", widget: "string" }

          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Descripción del negocio", name: "descripcion", widget: "text" }
              - { label: "Copyright", name: "copyright", widget: "string" }
              - { label: "Título columna acceso rápido", name: "links_rapidos_titulo", widget: "string" }
              - { label: "Título columna contacto", name: "contacto_titulo", widget: "string" }
              - { label: "Título columna redes", name: "redes_titulo", widget: "string" }
